<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Vogue - Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #8B4B9A;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Optimizing for your device...</p>
    </div>

    <script>
        // Detect device type
        function detectDevice() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // Check if device is mobile
            const isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgent.toLowerCase());
            const isTablet = /(ipad|tablet|playbook|silk)|(android(?!.*mobi))/i.test(userAgent.toLowerCase());
            const isSmallScreen = window.innerWidth < 768;
            
            // Route to appropriate version
            if ((isMobile || isSmallScreen) && !isTablet) {
                // Mobile version for phones
                window.location.href = '/mobile/index.html';
            } else {
                // Desktop version for desktop, tablets, and large screens
                window.location.href = '/desktop/index.html';
            }
        }

        // Run detection on load
        detectDevice();

        // Fallback in case of slow redirect
        setTimeout(() => {
            detectDevice();
        }, 2000);
    </script>
</body>
</html>
